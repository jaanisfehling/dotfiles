# Remove leader so it doesnt clash with neovim keybinds
unbind C-b
set -g prefix None

# Panes
bind -n M-s split-window -v -c "#{pane_current_path}"
bind -n M-v split-window -h -c "#{pane_current_path}"
bind -n M-r swap-pane -D

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-L resize-pane -R 5

bind -n M-q kill-pane
bind -n M-x kill-pane

set-option -g pane-active-border-style fg=blue
set-option -g pane-border-style fg=white

# Windows
bind -n M-c new-window -c "#{pane_current_path}"
bind -n M-p previous-window
bind -n M-n next-window
bind -n M-R swap-window -t +1

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Copy mode
bind -n M-y copy-mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -sel clip -i"

# Pane Styling
set -g pane-border-style bg=default,fg=brightblack
set -g pane-active-border-style bg=default,fg=blue
set -g display-panes-colour black
set -g display-panes-active-colour brightblack

# Status Styling
set -g status-style bg=black,fg=white
set -g status-left "#S "
set -g status-right " %a %H:%M %-d.%-m.%Y"

# Window Status Styling
set -g window-status-format "#[fg=white,bg=color237] #W #F "
set -g window-status-current-format "#[fg=white,bg=colour17] #W #F "
set -g window-status-separator " "

# Other
set -sg escape-time 0
set -g status-interval 5
set -g monitor-activity on
set -g visual-activity off
set-window-option -g mouse on
set -g @scroll-speed-num-lines-per-scroll 2
set -g history-limit 50000
set -g display-time 4000

